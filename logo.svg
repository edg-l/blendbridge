<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Top face: brightest -->
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623" />
      <stop offset="100%" stop-color="#E8920D" />
    </linearGradient>
    <!-- Left face: medium -->
    <linearGradient id="left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E87D0D" />
      <stop offset="100%" stop-color="#CC6A08" />
    </linearGradient>
    <!-- Right face: darkest -->
    <linearGradient id="right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CC6A08" />
      <stop offset="100%" stop-color="#A85500" />
    </linearGradient>
    <!-- Edge highlight -->
    <linearGradient id="edgeHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD080" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FFD080" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Isometric cube, centered -->
  <!-- Top face -->
  <polygon points="256,100 412,190 256,280 100,190" fill="url(#top)" />
  <!-- Left face -->
  <polygon points="100,190 256,280 256,412 100,322" fill="url(#left)" />
  <!-- Right face -->
  <polygon points="412,190 256,280 256,412 412,322" fill="url(#right)" />

  <!-- Subtle edge highlights -->
  <line x1="256" y1="100" x2="100" y2="190" stroke="#FFD080" stroke-width="1.5" opacity="0.3" />
  <line x1="256" y1="100" x2="412" y2="190" stroke="#FFD080" stroke-width="1.5" opacity="0.3" />
  <line x1="256" y1="280" x2="256" y2="412" stroke="#000000" stroke-width="1" opacity="0.15" />
  <line x1="100" y1="190" x2="100" y2="322" stroke="#FFD080" stroke-width="1" opacity="0.15" />

  <!-- Top face inner wireframe accent (subtle grid like Blender) -->
  <line x1="256" y1="100" x2="256" y2="280" stroke="#FFD080" stroke-width="1" opacity="0.12" />
  <line x1="100" y1="190" x2="412" y2="190" stroke="#FFD080" stroke-width="1" opacity="0.12" />
</svg>
